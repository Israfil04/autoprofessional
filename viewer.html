<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D просмотр детали</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .viewer-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #8b1a2b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            z-index: 10;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-link:hover {
            background: #a52235;
        }
        .loading-msg {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="viewer-container" id="viewerContainer">
        <!-- Кнопка назад: будет динамически формировать ссылку на главную с id товара -->
        <a href="#" class="back-link" id="backLink">← Назад к товару</a>
        <div class="loading-msg" id="loadingMsg">Загрузка модели...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // Получаем productId из URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('productId');
        
        // Устанавливаем ссылку назад (если productId есть, то с параметром product)
        const backLink = document.getElementById('backLink');
        if (productId) {
            backLink.href = `index.html?product=${productId}`;
        } else {
            backLink.href = 'index.html';
        }

        const container = document.getElementById('viewerContainer');
        const loadingMsg = document.getElementById('loadingMsg');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(5, 4, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0x404040));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x8b1a2b, 0.4);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);

        // Путь к модели (можно расширить: для разных productId подставлять разные модели)
        // Для демо используем одну модель, но можно сделать маппинг
        let modelPath = './model/model1.obj'; // по умолчанию
        if (productId) {
            // Пример: для productId=1 -> model1.obj, для 2 -> model2.obj и т.д.
            modelPath = `./model/model${productId}.obj`;
        }

        const loader = new OBJLoader();
        loader.load(
            modelPath,
            (object) => {
                // Центрирование и масштабирование
                const box = new THREE.Box3().setFromObject(object);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2.5 / maxDim;
                object.scale.set(scale, scale, scale);
                object.position.sub(center.multiplyScalar(scale));

                object.traverse(child => {
                    if (child.isMesh) {
                        if (!child.material) {
                            child.material = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.7 });
                        }
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(object);
                loadingMsg.textContent = 'Модель готова ✅';
                setTimeout(() => {
                    loadingMsg.style.opacity = '0';
                    setTimeout(() => loadingMsg.remove(), 500);
                }, 2000);
            },
            (xhr) => {
                const percent = xhr.total ? (xhr.loaded / xhr.total * 100).toFixed(0) : 0;
                loadingMsg.textContent = `Загрузка: ${percent}%`;
            },
            (error) => {
                console.error(error);
                loadingMsg.textContent = 'Ошибка загрузки модели';
                loadingMsg.style.color = '#ff6666';
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
