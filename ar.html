<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Примерка диска — Autoprofessional</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 5px;
            z-index: 9999;
            pointer-events: none;
            max-width: 80%;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #8B0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            z-index: 10000;
            text-decoration: none;
            font-family: sans-serif;
        }
        .back-btn:hover { background: #5A0000; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← На главную</a>
    <div id="info">
        AR готов<br>
        Наведите на маркер <b>hiro</b>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <a-marker preset="hiro">
           
            <a-entity
                position="0 0 0"
                scale="0.05 0.05 0.05"
                rotation="0 0 0"
                gltf-model="model/wheel.glb">
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const info = document.getElementById('info');
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            info.innerHTML = `[${time}] ${msg}<br>` + info.innerHTML;
            if(info.innerHTML.split('<br>').length > 6) {
                let lines = info.innerHTML.split('<br>');
                lines.pop();
                info.innerHTML = lines.join('<br>');
            }
        }
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(() => log('✅ Камера доступна'))
            .catch(e => log('❌ Ошибка камеры: ' + e.message));
        document.querySelector('a-scene').addEventListener('loaded', () => log('✅ AR сцена загружена'));
        document.querySelector('a-marker').addEventListener('markerFound', () => log('🔍 Маркер найден'));
        document.querySelector('a-marker').addEventListener('markerLost', () => log('👁️ Маркер потерян'));
    </script>
</body>
</html>
