<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Корзина – Autoprofessional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.5;
        }
        :root {
            --burgundy: #8B0000;
            --burgundy-light: #A52A2A;
        }
        /* Шапка (упрощённая) */
        .top-header {
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-inner {
            max-width: 1320px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.35rem;
            color: white;
        }
        .logo-text span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--burgundy-light);
        }
        .cart-btn {
            background: transparent;
            border: 2px solid #444;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #ccc;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--burgundy);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        .account-btn {
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        /* Основное содержимое */
        .cart-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            min-height: 60vh;
        }
        .cart-title {
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .cart-items {
            background: #1c1c1c;
            border-radius: 20px;
            overflow: hidden;
        }
        .cart-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr 0.5fr;
            background: #2a2a2a;
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid #444;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr 0.5fr;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .cart-item-info img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart-item-price, .cart-item-total {
            color: var(--burgundy-light);
            font-weight: 700;
        }
        .quantity-btn {
            background: #333;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            margin: 0 4px;
        }
        .quantity-btn:hover {
            background: var(--burgundy);
        }
        .remove-btn {
            background: transparent;
            border: none;
            color: #ff4444;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .cart-summary {
            margin-top: 30px;
            text-align: right;
            background: #1c1c1c;
            padding: 20px;
            border-radius: 20px;
        }
        .cart-total {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .cart-total span {
            color: var(--burgundy-light);
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: #1c1c1c;
            border-radius: 20px;
        }
        .btn-checkout {
            background: var(--burgundy);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-continue {
            background: transparent;
            border: 2px solid var(--burgundy);
            color: var(--burgundy-light);
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .footer {
            background: #0a0a0a;
            padding: 40px 24px 20px;
            border-top: 1px solid #222;
            margin-top: 60px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .cart-header { display: none; }
            .cart-item {
                grid-template-columns: 1fr;
                gap: 10px;
                text-align: center;
            }
            .cart-item-info { justify-content: center; }
            .quantity-btn { margin: 0 8px; }
            .cart-summary { text-align: center; }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fa-solid fa-gear"></i></div>
                <div class="logo-text">Autoprofessional<span>Премиум автозапчасти</span></div>
            </a>
            <div style="display: flex; gap: 16px;">
                <button class="cart-btn" id="cartBtn"><i class="fa-solid fa-cart-shopping"></i><span class="cart-count" id="cartCount">0</span></button>
                <button class="account-btn"><i class="fa-solid fa-user"></i> <span>Аккаунт</span></button>
            </div>
        </div>
    </header>

    <div class="cart-container" id="cartContainer"></div>

    <footer class="footer">
        <p style="color:#888;">© 2026 Autoprofessional — все права защищены</p>
    </footer>

    <script>
        let cart = [];
        function loadCart() {
            const saved = localStorage.getItem('autoprofessional_cart');
            if (saved) cart = JSON.parse(saved);
            else cart = [];
            updateCartCount();
            renderCart();
        }
        function saveCart() {
            localStorage.setItem('autoprofessional_cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }
        function updateCartCount() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const el = document.getElementById('cartCount');
            if (el) el.innerText = total;
        }
        function updateQuantity(id, delta) {
            const idx = cart.findIndex(i => i.id == id);
            if (idx !== -1) {
                cart[idx].quantity += delta;
                if (cart[idx].quantity <= 0) cart.splice(idx, 1);
                saveCart();
            }
        }
        function removeItem(id) {
            cart = cart.filter(i => i.id != id);
            saveCart();
        }
        function renderCart() {
            const container = document.getElementById('cartContainer');
            if (!container) return;
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-shopping" style="font-size: 4rem; color: #555;"></i>
                        <h3>Корзина пуста</h3>
                        <p>Добавьте товары из каталога</p>
                        <a href="index.html" class="btn-continue">← Вернуться к покупкам</a>
                    </div>`;
                return;
            }
            let total = 0;
            const itemsHtml = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <img src="${item.image}" alt="${item.title}" onerror="this.src='https://images.unsplash.com/photo-1603584173870-7f23fdae1b7d?w=100&h=100&fit=crop'">
                            <div>${item.title}</div>
                        </div>
                        <div class="cart-item-price">${item.price.toLocaleString('ru-RU')} ₽</div>
                        <div>
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', -1)">−</button>
                            <span style="margin:0 8px;">${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <div class="cart-item-total">${itemTotal.toLocaleString('ru-RU')} ₽</div>
                        <div><button class="remove-btn" onclick="removeItem('${item.id}')"><i class="fa-solid fa-trash"></i></button></div>
                    </div>`;
            }).join('');
            container.innerHTML = `
                <h1 class="cart-title">Корзина</h1>
                <div class="cart-items">
                    <div class="cart-header">
                        <div>Товар</div><div>Цена</div><div>Количество</div><div>Сумма</div><div></div>
                    </div>
                    ${itemsHtml}
                </div>
                <div class="cart-summary">
                    <div class="cart-total">Общая сумма: <span>${total.toLocaleString('ru-RU')} ₽</span></div>
                    <button class="btn-checkout" onclick="alert('Оформление заказа – демо-режим')">Оформить заказ</button>
                    <div style="margin-top:15px;"><a href="index.html" class="btn-continue">← Продолжить покупки</a></div>
                </div>`;
        }
        document.addEventListener('DOMContentLoaded', loadCart);
        document.getElementById('cartBtn').addEventListener('click', () => window.location.reload());
    </script>
</body>
</html>
